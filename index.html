<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sync KOReader Highlights</title>
    <style>
      /* Theme variables (--ls-*) are injected at runtime by panel.ts via
         <style id="skh-theme-vars">, pulled from the live Logseq theme
         with a light/dark fallback. CSS below consumes them directly so
         the panel always matches the user's graph. */
      * { box-sizing: border-box; }

      body, .skh-dialog, .skh-dialog h1, .skh-dialog input, .skh-dialog button {
        font-family: var(--ls-font-family, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif);
      }

      div#app {
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(3px);
      }

      dialog.skh-dialog {
        border: 1px solid var(--ls-border-color);
        background: var(--ls-primary-background-color);
        color: var(--ls-primary-text-color);
        border-radius: 12px;
        padding: 20px 22px;
        width: min(560px, 92vw);
        max-height: 86vh;
        overflow-y: auto;
        box-shadow: 0 14px 48px rgba(0, 0, 0, 0.35);
        font-size: 14px;
        scrollbar-width: thin;
        scrollbar-color: var(--ls-border-color) transparent;
      }
      dialog.skh-dialog::backdrop { background: rgba(0, 0, 0, 0.45); }
      dialog.skh-dialog::-webkit-scrollbar { width: 10px; }
      dialog.skh-dialog::-webkit-scrollbar-track { background: transparent; }
      dialog.skh-dialog::-webkit-scrollbar-thumb {
        background: var(--ls-border-color);
        background-clip: content-box;
        border: 2px solid transparent;
        border-radius: 999px;
      }
      dialog.skh-dialog::-webkit-scrollbar-thumb:hover {
        background: var(--ls-secondary-text-color);
        background-clip: content-box;
      }

      .skh-head {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 14px;
      }
      .skh-head h1 {
        font-size: 17px; font-weight: 700; margin: 0;
        color: var(--ls-primary-text-color);
      }

      .skh-status { font-size: 13px; line-height: 1.6; margin-bottom: 14px; }
      .skh-status .skh-dir { font-weight: 600; word-break: break-all; }
      .skh-status .skh-muted { color: var(--ls-secondary-text-color); }
      .skh-status .skh-warn { color: #d9822b; font-weight: 600; margin-top: 4px; }
      .skh-status .skh-warn[hidden] { display: none; }

      .skh-actions { display: flex; gap: 10px; flex-wrap: wrap; }

      .skh-btn {
        appearance: none; cursor: pointer; font-size: 13px;
        padding: 9px 16px; border-radius: 8px;
        border: 1px solid var(--ls-border-color);
        background: var(--ls-secondary-background-color);
        color: var(--ls-primary-text-color);
      }
      .skh-btn:hover:not([disabled]) { background: var(--ls-tertiary-background-color); }
      .skh-btn[disabled] { opacity: 0.5; cursor: not-allowed; }

      .skh-primary {
        appearance: none; cursor: pointer; font-size: 13px; font-weight: 600;
        padding: 9px 16px; border-radius: 8px; border: none;
        background: var(--ls-link-text-color, var(--ls-active-primary-color, #2563eb));
        color: #fff; white-space: nowrap;
      }
      .skh-primary:hover:not([disabled]) { filter: brightness(1.08); }
      .skh-primary[disabled] { opacity: 0.5; cursor: not-allowed; }

      .skh-log {
        background: var(--ls-secondary-background-color);
        color: var(--ls-primary-text-color);
        border: 1px solid var(--ls-border-color);
        padding: 10px;
        border-radius: 8px;
        max-height: 200px;
        overflow: auto;
        font-size: 12px;
        white-space: pre-wrap;
        margin: 14px 0 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .skh-log:empty { display: none; }

      .skh-foot {
        margin-top: 16px; padding-top: 12px;
        border-top: 1px solid var(--ls-border-color);
        display: flex; align-items: center; justify-content: space-between;
        font-size: 12px;
      }
      .skh-link {
        appearance: none; cursor: pointer; background: none; border: none;
        color: var(--ls-link-text-color); font-size: 13px; padding: 0;
        text-decoration: none;
      }
      .skh-link:hover { text-decoration: underline; }
      .skh-iconbtn {
        appearance: none; cursor: pointer; background: none; border: none;
        color: var(--ls-secondary-text-color); font-size: 16px; line-height: 1;
        padding: 4px 8px; border-radius: 6px;
      }
      .skh-iconbtn:hover {
        background: var(--ls-tertiary-background-color);
        color: var(--ls-primary-text-color);
      }
      .skh-version { color: var(--ls-secondary-text-color); font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
