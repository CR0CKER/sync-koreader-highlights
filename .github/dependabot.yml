version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    # Hold freshly-published releases for a few days so a compromised
    # version can't reach us the moment it lands (supply-chain cooldown).
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    labels:
      - dependencies
